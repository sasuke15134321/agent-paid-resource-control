services:
  - type: web
    name: agent-paid-resource-control
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WALLET_ADDRESS
        sync: false
      - key: CDP_API_KEY_ID
        sync: false
      - key: CDP_API_KEY_SECRET
        sync: false
      - key: TEST_MODE
        value: "false"
